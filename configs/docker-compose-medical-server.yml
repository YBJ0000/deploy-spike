services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    # 健康检查可选，便于 Dokploy 判断就绪
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  raidar:
    # 使用自建并推送到 Docker Hub 的 medical-server 镜像
    # 使用“带版本/日期的 tag”避免 Dokploy 侧缓存旧镜像；tag 来自 deploy-spike/.env 中的 RAIDAR_TAG，例如：RAIDAR_TAG=server-20260311-2
    image: yangbingjia1206/raidar:${RAIDAR_TAG}
    container_name: raidar
    ports:
      - "8080:8080"
    environment:
      MONGODB_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1024M

volumes:
  mongodb_data:
  rabbitmq_data:
  redis_data:
